<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" role="img" aria-label="Think Tank — cartographer">
  <rect width="1200" height="460" fill="#1a1410"></rect>
  
  <rect x="40" y="40" width="1120" height="380" fill="#e8dcc0"></rect>
  
  <rect x="40" y="40" width="1120" height="380" fill="#1a1410" opacity="0.04"></rect>
  
  <g transform="translate(1060,120)" stroke="#3a2a1a" fill="#3a2a1a">
    <circle cx="0" cy="0" r="44" fill="none" stroke-width="1"></circle>
    <circle cx="0" cy="0" r="34" fill="none" stroke-width="0.5" opacity="0.6"></circle>
    <polygon points="0,-44 6,0 0,44 -6,0" fill="#3a2a1a" opacity="0.85"></polygon>
    <polygon points="-44,0 0,6 44,0 0,-6" fill="none" stroke-width="0.8"></polygon>
    <text x="0" y="-50" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-style="italic">N</text>
  </g>

  
  <g font-family="Georgia, &#39;Times New Roman&#39;, serif" fill="#3a2a1a">
    <text x="100" y="140" font-size="14" letter-spacing="6" font-style="italic">— A MAP OF —</text>
    <text x="100" y="220" font-size="86" font-weight="700" letter-spacing="-1">Think Tank</text>
    <text x="100" y="252" font-size="15" font-style="italic" opacity="0.85">being a local-first workspace wherein human and agent</text>
    <text x="100" y="272" font-size="15" font-style="italic" opacity="0.85">together cultivate an idea into durable artifact.</text>
  </g>

  
  <g transform="translate(180,310)" stroke="#3a2a1a" fill="#3a2a1a" font-family="Georgia, serif" font-size="11" font-style="italic">
    
    <g stroke-dasharray="2 4" stroke-width="0.8" fill="none">
      <path d="M0,40 Q120,0 240,30"></path>
      <path d="M240,30 Q360,60 480,20"></path>
      <path d="M480,20 Q600,50 720,30"></path>
      <path d="M0,40 Q60,90 160,80"></path>
      <path d="M160,80 Q280,90 360,80"></path>
      <path d="M360,80 Q480,90 600,80"></path>
      <path d="M240,30 L160,80"></path>
      <path d="M480,20 L360,80"></path>
      <path d="M720,30 L600,80"></path>
    </g>
    
    <g>
      <circle cx="0" cy="40" r="4" fill="#3a2a1a"></circle><text x="0" y="24" text-anchor="middle">claims</text>
      <circle cx="240" cy="30" r="4" fill="#3a2a1a"></circle><text x="240" y="14" text-anchor="middle">questions</text>
      <circle cx="480" cy="20" r="4" fill="#3a2a1a"></circle><text x="480" y="4" text-anchor="middle">evidence</text>
      <circle cx="720" cy="30" r="4" fill="#3a2a1a"></circle><text x="720" y="14" text-anchor="middle">decisions</text>
      <circle cx="160" cy="80" r="4" fill="#3a2a1a"></circle><text x="160" y="100" text-anchor="middle">assumptions</text>
      <circle cx="360" cy="80" r="4" fill="#3a2a1a"></circle><text x="360" y="100" text-anchor="middle">disagreements</text>
      <circle cx="600" cy="80" r="4" fill="#3a2a1a"></circle><text x="600" y="100" text-anchor="middle">artifacts</text>
    </g>
  </g>

  
  <g stroke="#3a2a1a" fill="none" stroke-width="1">
    <path d="M60 60 L80 60 M60 60 L60 80"></path>
    <path d="M1140 60 L1120 60 M1140 60 L1140 80"></path>
    <path d="M60 400 L80 400 M60 400 L60 380"></path>
    <path d="M1140 400 L1120 400 M1140 400 L1140 380"></path>
  </g>

  
  <text x="600" y="446" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="12" fill="#c9b896" letter-spacing="3">— hic sunt ideae —</text>
</svg>